name: CI/CD Pipeline - EFT DevOps

on:
  push:
    branches: [ "main" ] # Se activa automáticamente al subir cambios a la rama main

jobs:
  # --- ETAPA 1: VALIDACIÓN Y COMPILACIÓN ---
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código fuente
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # Compilación usando las rutas reales de tus proyectos internos
    - name: Validar compilación de Backend Despachos
      run: |
        cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        mvn clean compile

    - name: Validar compilación de Backend Ventas
      run: |
        cd back-Ventas_SpringBoot/Springboot-API-REST
        mvn clean compile

  # --- ETAPA 2: CONSTRUCCIÓN Y SUBIDA DE IMÁGENES (DOCKER HUB) ---
  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código fuente
      uses: actions/checkout@v4

    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Construcción automatizada usando tus Dockerfiles optimizados
    - name: Build & Push - Backend Despachos
      uses: docker/build-push-action@v5
      with:
        context: ./back-Despachos_SpringBoot
        file: ./back-Despachos_SpringBoot/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest

    - name: Build & Push - Backend Ventas
      uses: docker/build-push-action@v5
      with:
        context: ./back-Ventas_SpringBoot
        file: ./back-Ventas_SpringBoot/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:latest

    - name: Build & Push - Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./front_despacho
        file: ./front_despacho/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest